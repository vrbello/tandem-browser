<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Pre-paint theme stamp for webview-loaded shell pages.
       The main BrowserWindow gets the theme via preload+additionalArguments,
       but webviews don't inherit that path — so we do a tiny sync XHR here to
       stamp data-theme before the inline <style> blocks are processed by the
       parser. Sync XHR is deprecated (console warning), but it's the only way
       to avoid a dark→light flash. Fails silently if the API isn't up. -->
  <script src="js/api-base.js"></script>
  <script>
    (function () {
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', ((window.__TANDEM_API_BASE__ || 'http://127.0.0.1:8765') + '/config'), false);
        xhr.send();
        if (xhr.status === 200) {
          var cfg = JSON.parse(xhr.responseText);
          var theme = (cfg && cfg.appearance && cfg.appearance.theme) || 'dark';
          if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
          else if (theme === 'system') document.documentElement.setAttribute('data-theme', 'system');
        }
      } catch (e) { /* API not ready; theme.js will apply on load */ }
    })();
  </script>
  <meta charset="UTF-8">
  <title>About Tandem</title>
  <script type="module" src="js/theme.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      background: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: rgba(16, 20, 40, 0.55);
      -webkit-backdrop-filter: blur(32px) saturate(1.8) brightness(0.9);
      backdrop-filter: blur(32px) saturate(1.8) brightness(0.9);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 30px;
      user-select: none;
      -webkit-app-region: drag;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border-radius: 12px;
      overflow: hidden;
    }
    .logo {
      width: 180px;
      height: auto;
      opacity: 0.85;
      margin-bottom: 20px;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .title .t { color: #e94560; }
    .title .rest { color: #ffffff; }
    .subtitle {
      font-size: 14px;
      color: #8892a4;
      margin-bottom: 10px;
    }
    .status-badge {
      background: rgba(96, 165, 250, 0.15);
      color: #93c5fd;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .quote {
      font-style: italic;
      color: #a0aec0;
      font-size: 13px;
      margin-bottom: 24px;
    }
    .version {
      background: rgba(233, 69, 96, 0.15);
      color: #e94560;
      padding: 4px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .info {
      text-align: center;
      font-size: 13px;
      color: #8892a4;
      line-height: 1.8;
      margin-bottom: 24px;
    }
    .links {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      -webkit-app-region: no-drag;
    }
    .links a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 13px;
      padding: 6px 14px;
      border: 1px solid rgba(96, 165, 250, 0.3);
      border-radius: 8px;
      transition: all 0.2s;
    }
    .links a:hover {
      background: rgba(96, 165, 250, 0.1);
      border-color: rgba(96, 165, 250, 0.6);
    }
    .copyright {
      font-size: 12px;
      color: #4a5568;
    }
    .team {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <img class="logo" src="tandem-bike.png" alt="Tandem">
  <div class="title"><span class="t">T</span><span class="rest">andem</span></div>
  <div class="subtitle">First-Party OpenClaw Companion Browser</div>
  <div class="status-badge">Developer Preview</div>
  <div class="version" id="version"></div>
  <script>
    const v = window.__TANDEM_VERSION__;
    if (v) document.getElementById('version').textContent = 'v' + v;
  </script>
  <div class="info">
    Built specifically for human-AI collaboration with OpenClaw.<br>
    Maintained in the same ecosystem as OpenClaw, with security and local control built in.
  </div>
  <div class="links">
    <a href="https://github.com/hydro13" target="_blank">GitHub — hydro13</a>
  </div>
  <div class="copyright">© 2026 Robin Waslander</div>
</body>
</html>
