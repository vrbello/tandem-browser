<!DOCTYPE html>
<html lang="nl">
<head>
  <!-- Pre-paint theme stamp for webview-loaded shell pages.
       The main BrowserWindow gets the theme via preload+additionalArguments,
       but webviews don't inherit that path — so we do a tiny sync XHR here to
       stamp data-theme before the inline <style> blocks are processed by the
       parser. Sync XHR is deprecated (console warning), but it's the only way
       to avoid a dark→light flash. Fails silently if the API isn't up. -->
  <script src="js/api-base.js"></script>
  <script>
    (function () {
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', ((window.__TANDEM_API_BASE__ || 'http://127.0.0.1:8765') + '/config'), false);
        xhr.send();
        if (xhr.status === 200) {
          var cfg = JSON.parse(xhr.responseText);
          var theme = (cfg && cfg.appearance && cfg.appearance.theme) || 'dark';
          if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
          else if (theme === 'system') document.documentElement.setAttribute('data-theme', 'system');
        }
      } catch (e) { /* API not ready; theme.js will apply on load */ }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmarks</title>
  <script type="module" src="js/theme.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #1c2a4a;
      --surface-hover: #1a2744;
      --accent: #e94560;
      --text: #eee;
      --text-dim: #888;
      --text-muted: #555;
      --border: rgba(255,255,255,0.06);
      --input-bg: #0f3460;
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --surface-hover: #e2e8f0;
      --accent: #e94560;
      --text: #1e293b;
      --text-dim: #64748b;
      --text-muted: #94a3b8;
      --border: rgba(0,0,0,0.08);
      --input-bg: #f1f5f9;
    }

    @media (prefers-color-scheme: light) {
      [data-theme="system"] {
        --bg: #f8fafc;
        --surface: #ffffff;
        --surface2: #f1f5f9;
        --surface-hover: #e2e8f0;
        --accent: #e94560;
        --text: #1e293b;
        --text-dim: #64748b;
        --text-muted: #94a3b8;
        --border: rgba(0,0,0,0.08);
        --input-bg: #f1f5f9;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 20px 16px 12px;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header span { color: #e94560; }

    .folder-tree { padding: 8px 0; flex: 1; }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-dim);
      transition: all 0.15s;
      user-select: none;
    }
    .tree-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .tree-item.active { background: rgba(233,69,96,0.15); color: #e94560; }
    .tree-item .icon { font-size: 14px; flex-shrink: 0; }
    .tree-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-children { padding-left: 20px; }

    .sidebar-actions {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .sidebar-actions button {
      flex: 1;
      padding: 6px 12px;
      background: var(--input-bg);
      border: none;
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sidebar-actions button:hover { background: var(--input-bg); color: var(--text); }

    /* Main content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .toolbar .breadcrumb {
      font-size: 14px;
      color: var(--text-dim);
      flex: 1;
    }
    .breadcrumb span { cursor: pointer; color: var(--text-dim); }
    .breadcrumb span:hover { color: var(--text); }
    .breadcrumb .sep { color: var(--text-muted); margin: 0 4px; }

    .search-box {
      position: relative;
      width: 280px;
    }
    .search-box input {
      width: 100%;
      padding: 6px 12px;
      padding-left: 30px;
      background: var(--input-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .search-box input:focus { border-color: #e94560; }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-box .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 12px;
    }

    .toolbar button {
      padding: 6px 14px;
      background: var(--input-bg);
      border: none;
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .toolbar button:hover { background: var(--input-bg); color: var(--text); }
    .toolbar button.accent { background: #e94560; color: #fff; }
    .toolbar button.accent:hover { background: #d03050; }

    /* Bookmark list */
    .bookmark-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .bm-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    .bm-item:hover { background: rgba(255,255,255,0.05); }
    .bm-item .bm-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
    .bm-item .bm-icon img { width: 16px; height: 16px; border-radius: 2px; vertical-align: middle; }
    .bm-item .bm-info { flex: 1; min-width: 0; }
    .bm-item .bm-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bm-item .bm-url { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .bm-item .bm-actions { display: none; gap: 4px; }
    .bm-item:hover .bm-actions { display: flex; }
    .bm-item .bm-actions button {
      padding: 3px 8px;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 4px;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
    }
    .bm-item .bm-actions button:hover { color: var(--text); background: rgba(255,255,255,0.15); }
    .bm-item .bm-actions button.delete:hover { color: #e94560; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Edit dialog */
    .dialog-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 5000;
      align-items: center;
      justify-content: center;
    }
    .dialog-overlay.open { display: flex; }
    .dialog {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 24px;
      width: 420px;
      max-width: 90%;
    }
    .dialog h3 { font-size: 16px; margin-bottom: 16px; }
    .dialog label { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 4px; }
    .dialog input {
      width: 100%;
      padding: 8px 12px;
      background: var(--input-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      margin-bottom: 12px;
    }
    .dialog input:focus { border-color: #e94560; }
    .dialog-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
    .dialog-buttons button {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .dialog-buttons .btn-cancel { background: var(--input-bg); color: var(--text-dim); }
    .dialog-buttons .btn-cancel:hover { color: var(--text); }
    .dialog-buttons .btn-save { background: #e94560; color: #fff; }
    .dialog-buttons .btn-save:hover { background: #d03050; }
  </style>
</head>
<body>
  <!-- Sidebar: folder tree -->
  <div class="sidebar">
    <div class="sidebar-header"><span>B</span>ookmarks</div>
    <div class="folder-tree" id="folder-tree"></div>
    <div class="sidebar-actions">
      <button id="btn-new-folder">+ Folder</button>
      <button id="btn-import-chrome">Chrome Import</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">
    <div class="toolbar">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="search-box">
        <span class="search-icon">&#x1F50D;</span>
        <input type="text" id="search" placeholder="Search bookmarks...">
      </div>
      <button id="btn-add-bookmark" class="accent">+ Bookmark</button>
    </div>
    <div class="bookmark-list" id="bookmark-list"></div>
  </div>

  <!-- Edit dialog -->
  <div class="dialog-overlay" id="dialog-overlay">
    <div class="dialog">
      <h3 id="dialog-title">Edit</h3>
      <label>Name</label>
      <input type="text" id="dialog-name">
      <div id="dialog-url-group">
        <label>URL</label>
        <input type="text" id="dialog-url">
      </div>
      <div class="dialog-buttons">
        <button class="btn-cancel" id="btn-dialog-cancel">Cancel</button>
        <button class="btn-save" id="btn-dialog-save">Save</button>
      </div>
    </div>
  </div>

  <script src="js/api-auth.js"></script>
  <script>
    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    const API = window.tandemApi?.baseUrl() || window.__TANDEM_API_BASE__ || 'http://127.0.0.1:8765';
    let allBookmarks = [];
    let currentFolderId = null; // null = root, or folder id
    let currentFolderPath = []; // breadcrumb path
    let editingId = null;
    let isNewFolder = false;
    let isNewBookmark = false;

    function createEmptyState(text) {
      const el = document.createElement('div');
      el.className = 'empty-state';
      el.textContent = text;
      return el;
    }

    function parseSafeNavigationUrl(rawUrl) {
      try {
        const parsed = new URL(rawUrl, window.location.href);
        if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') {
          return null;
        }
        return parsed;
      } catch {
        return null;
      }
    }

    function createFavicon(hostname) {
      const img = document.createElement('img');
      img.src = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(hostname)}&sz=32`;
      img.alt = '';
      img.addEventListener('error', () => {
        const parent = img.parentElement;
        if (parent) parent.textContent = '🔗';
      });
      return img;
    }

    function navigateToBookmark(rawUrl) {
      const parsed = parseSafeNavigationUrl(rawUrl);
      if (parsed) {
        window.location.assign(parsed.href);
      }
    }

    function createActionButton(className, label, id) {
      const button = document.createElement('button');
      button.className = className;
      button.dataset.id = id || '';
      button.textContent = label;
      return button;
    }

    function buildActions(item) {
      const actions = document.createElement('div');
      actions.className = 'bm-actions';
      actions.appendChild(createActionButton('edit', 'Edit', item.id || ''));
      actions.appendChild(createActionButton('delete', 'Delete', item.id || ''));
      return actions;
    }

    function buildBookmarkRow(item, includeActions = true) {
      const el = document.createElement('div');
      el.className = 'bm-item';

      let hostname = '';
      const parsedUrl = parseSafeNavigationUrl(item.url || '');
      if (parsedUrl) hostname = parsedUrl.hostname;

      const icon = document.createElement('div');
      icon.className = 'bm-icon';
      icon.appendChild(createFavicon(hostname));

      const info = document.createElement('div');
      info.className = 'bm-info';
      const name = document.createElement('div');
      name.className = 'bm-name';
      name.textContent = item.name || hostname;
      const url = document.createElement('div');
      url.className = 'bm-url';
      url.textContent = item.url || '';
      info.append(name, url);

      el.append(icon, info);
      if (includeActions) {
        el.appendChild(buildActions(item));
      }

      return { el, info };
    }

    function buildFolderRow(item) {
      const el = document.createElement('div');
      el.className = 'bm-item';

      const icon = document.createElement('div');
      icon.className = 'bm-icon';
      icon.innerHTML = '&#x1F4C1;';

      const info = document.createElement('div');
      info.className = 'bm-info';
      const name = document.createElement('div');
      name.className = 'bm-name';
      name.textContent = item.name || '';
      const count = document.createElement('div');
      count.className = 'bm-url';
      count.textContent = `${item.children ? item.children.length : 0} items`;
      info.append(name, count);

      el.append(icon, info, buildActions(item));
      return { el, info };
    }

    // Fetch all bookmarks
    async function fetchBookmarks() {
      const res = await fetch(`${API}/bookmarks`);
      const data = await res.json();
      allBookmarks = data.bookmarks || [];
      renderTree();
      renderList();
    }

    // Find folder by ID in tree
    function findFolder(id, list = allBookmarks) {
      for (const item of list) {
        if (item.id === id) return item;
        if (item.children) {
          const found = findFolder(id, item.children);
          if (found) return found;
        }
      }
      return null;
    }

    // Get items for current folder
    function getCurrentItems() {
      if (!currentFolderId) return allBookmarks;
      const folder = findFolder(currentFolderId);
      return folder && folder.children ? folder.children : [];
    }

    // Render folder tree in sidebar
    function renderTree() {
      const tree = document.getElementById('folder-tree');
      tree.innerHTML = '';

      // All Bookmarks root
      const root = document.createElement('div');
      root.className = `tree-item ${!currentFolderId ? 'active' : ''}`;
      root.innerHTML = '<span class="icon">&#x1F4D6;</span><span class="name">Alle Bookmarks</span>';
      root.addEventListener('click', () => navigateToFolder(null, []));
      tree.appendChild(root);

      // Render folders recursively
      function renderFolders(items, container, path = []) {
        for (const item of items) {
          if (item.type !== 'folder') continue;
          const el = document.createElement('div');
          el.className = `tree-item ${currentFolderId === item.id ? 'active' : ''}`;
          el.innerHTML = `<span class="icon">&#x1F4C1;</span><span class="name">${escapeHtml(item.name)}</span>`;
          const itemPath = [...path, { id: item.id, name: item.name }];
          el.addEventListener('click', (e) => {
            e.stopPropagation();
            navigateToFolder(item.id, itemPath);
          });
          container.appendChild(el);

          if (item.children && item.children.some(c => c.type === 'folder')) {
            const children = document.createElement('div');
            children.className = 'tree-children';
            renderFolders(item.children, children, itemPath);
            container.appendChild(children);
          }
        }
      }

      renderFolders(allBookmarks, tree);
    }

    // Navigate to folder
    function navigateToFolder(folderId, path) {
      currentFolderId = folderId;
      currentFolderPath = path;
      renderTree();
      renderList();
      renderBreadcrumb();
    }

    // Render breadcrumb
    function renderBreadcrumb() {
      const el = document.getElementById('breadcrumb');
      el.replaceChildren();

      const root = document.createElement('span');
      root.dataset.id = '';
      root.textContent = 'Alle Bookmarks';
      el.appendChild(root);

      for (const item of currentFolderPath) {
        const sep = document.createElement('span');
        sep.className = 'sep';
        sep.textContent = '›';
        el.appendChild(sep);

        const crumb = document.createElement('span');
        crumb.dataset.id = item.id || '';
        crumb.textContent = item.name || '';
        el.appendChild(crumb);
      }

      el.querySelectorAll('span[data-id]').forEach(span => {
        span.addEventListener('click', () => {
          const id = span.dataset.id || null;
          const idx = currentFolderPath.findIndex(p => p.id === id);
          const path = id ? currentFolderPath.slice(0, idx + 1) : [];
          navigateToFolder(id, path);
        });
      });
    }

    // Render bookmark list
    function renderList() {
      const list = document.getElementById('bookmark-list');
      const items = getCurrentItems();
      list.replaceChildren();

      if (items.length === 0) {
        list.appendChild(createEmptyState('No bookmarks in this folder'));
        return;
      }

      // Sort: folders first, then by name
      const sorted = [...items].sort((a, b) => {
        if (a.type === 'folder' && b.type !== 'folder') return -1;
        if (a.type !== 'folder' && b.type === 'folder') return 1;
        return (a.name || '').localeCompare(b.name || '');
      });

      for (const item of sorted) {
        let row;

        if (item.type === 'folder') {
          row = buildFolderRow(item);
          row.el.addEventListener('dblclick', () => {
            const path = [...currentFolderPath, { id: item.id, name: item.name }];
            navigateToFolder(item.id, path);
          });
          row.info.addEventListener('click', () => {
            const path = [...currentFolderPath, { id: item.id, name: item.name }];
            navigateToFolder(item.id, path);
          });
        } else {
          row = buildBookmarkRow(item, true);
          row.info.addEventListener('click', () => {
            navigateToBookmark(item.url || '');
          });
        }

        const el = row.el;

        // Edit button
        el.querySelector('.edit')?.addEventListener('click', (e) => {
          e.stopPropagation();
          openEditDialog(item);
        });

        // Delete button
        el.querySelector('.delete')?.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (confirm(`Delete "${item.name}"?`)) {
            await fetch(`${API}/bookmarks/remove`, {
              method: 'DELETE',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ id: item.id }),
            });
            fetchBookmarks();
          }
        });

        list.appendChild(el);
      }
    }

    // Edit dialog
    function openEditDialog(item) {
      editingId = item ? item.id : null;
      isNewFolder = false;
      isNewBookmark = false;
      document.getElementById('dialog-title').textContent = item ? 'Edit' : 'New';
      document.getElementById('dialog-name').value = item ? item.name : '';
      document.getElementById('dialog-url').value = item && item.url ? item.url : '';
      document.getElementById('dialog-url-group').style.display = item && item.type === 'folder' ? 'none' : 'block';
      document.getElementById('dialog-overlay').classList.add('open');
      document.getElementById('dialog-name').focus();
    }

    function openNewFolderDialog() {
      editingId = null;
      isNewFolder = true;
      isNewBookmark = false;
      document.getElementById('dialog-title').textContent = 'New Folder';
      document.getElementById('dialog-name').value = '';
      document.getElementById('dialog-url').value = '';
      document.getElementById('dialog-url-group').style.display = 'none';
      document.getElementById('dialog-overlay').classList.add('open');
      document.getElementById('dialog-name').focus();
    }

    function openNewBookmarkDialog() {
      editingId = null;
      isNewFolder = false;
      isNewBookmark = true;
      document.getElementById('dialog-title').textContent = 'New Bookmark';
      document.getElementById('dialog-name').value = '';
      document.getElementById('dialog-url').value = 'https://';
      document.getElementById('dialog-url-group').style.display = 'block';
      document.getElementById('dialog-overlay').classList.add('open');
      document.getElementById('dialog-name').focus();
    }

    function closeDialog() {
      document.getElementById('dialog-overlay').classList.remove('open');
      editingId = null;
      isNewFolder = false;
      isNewBookmark = false;
    }

    async function saveDialog() {
      const name = document.getElementById('dialog-name').value.trim();
      const url = document.getElementById('dialog-url').value.trim();

      if (!name) return;

      if (isNewFolder) {
        await fetch(`${API}/bookmarks/add-folder`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, parentId: currentFolderId }),
        });
      } else if (isNewBookmark) {
        if (!url) return;
        await fetch(`${API}/bookmarks/add`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, url, parentId: currentFolderId }),
        });
      } else if (editingId) {
        await fetch(`${API}/bookmarks/update`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: editingId, name, url: url || undefined }),
        });
      }

      closeDialog();
      fetchBookmarks();
    }

    // Search
    let searchTimeout;
    document.getElementById('search').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(async () => {
        const q = e.target.value.trim();
        if (!q) {
          renderList();
          return;
        }
        const res = await fetch(`${API}/bookmarks/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        const list = document.getElementById('bookmark-list');
        list.replaceChildren();

        if (!data.results || data.results.length === 0) {
          list.appendChild(createEmptyState('Geen resultaten'));
          return;
        }

        for (const item of data.results) {
          const row = buildBookmarkRow(item, false);
          row.el.addEventListener('click', () => {
            navigateToBookmark(item.url || '');
          });
          list.appendChild(row.el);
        }
      }, 300);
    });

    // Event listeners
    document.getElementById('btn-dialog-cancel').addEventListener('click', closeDialog);
    document.getElementById('btn-dialog-save').addEventListener('click', saveDialog);
    document.getElementById('dialog-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('dialog-overlay')) closeDialog();
    });
    document.getElementById('btn-new-folder').addEventListener('click', openNewFolderDialog);
    document.getElementById('btn-add-bookmark').addEventListener('click', openNewBookmarkDialog);

    document.getElementById('btn-import-chrome').addEventListener('click', async () => {
      const btn = document.getElementById('btn-import-chrome');
      btn.textContent = 'Importing...';
      btn.disabled = true;
      try {
        const res = await fetch(`${API}/import/chrome/bookmarks`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          alert(`${data.count} bookmarks imported!`);
          fetchBookmarks();
        } else {
          alert('Import failed: ' + (data.error || 'Unknown error'));
        }
      } catch (e) {
        alert('Import failed: ' + e.message);
      }
      btn.textContent = 'Chrome Import';
      btn.disabled = false;
    });

    // Keyboard: Enter to save dialog, Escape to close
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && document.getElementById('dialog-overlay').classList.contains('open')) {
        saveDialog();
      }
      if (e.key === 'Escape') {
        closeDialog();
      }
    });

    // Init
    fetchBookmarks();
    renderBreadcrumb();

    // Theme sync is handled by shell/js/theme.js (loaded in <head>).
  </script>
</body>
</html>
